# ~/.config/capsule.toml
# Capsule — a Starship prompt theme with Google-inspired colors in a powerline pill style.
# Source: https://github.com/starship/starship/discussions/1107?sort=top#discussioncomment-11130385

# ── Global ────────────────────────────────────────────────────────────────────
format = """
$os\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$aws\
$bun\
$deno\
$docker_context\
$golang\
${custom.hugo}\
$java\
$nodejs\
$python\
${custom.rails}\
$ruby\
$rust\
$terraform\
$cmd_duration\
$shell\
$time\
$username\
$hostname\
$line_break\
$character\
"""

palette = 'capsule'
add_newline = true
command_timeout = 2000

# ── Palette ───────────────────────────────────────────────────────────────────
[palettes.capsule]
text_light   = '#ffffff'   # white — pill text on dark backgrounds
text_dark    = '#202124'   # near-black — pill text on bright backgrounds
current_line = '#5F6368'   # mid grey — dividers (─) and fill
blue         = '#1967d2'   # dark blue — directory, docker pills
blue2        = '#4285F4'   # original Google Blue — unused (too bright for white text)
cyan         = '#24C1E0'   # light cyan — golang pill
teal         = '#129EAF'   # dark teal — cmd_duration pill
green        = '#188038'   # dark green — git, bun, deno, nodejs pills
orange       = '#FA7B17'   # orange — aws, java, rust, hostname pills
pink         = '#B0197C'   # dark pink — hugo pill
purple       = '#A142F4'   # purple — terraform, time pills
red          = '#D93025'   # dark red — rails, ruby pills
yellow       = '#FBBC05'   # yellow — python, username pills
gray         = '#9AA0A6'   # light grey — shell pill
dark_gray    = '#3C4043'   # dark grey — os pill

# ── OS ────────────────────────────────────────────────────────────────────────
[os]
format = '[](fg:dark_gray)[$symbol ](bold fg:text_light bg:dark_gray)[](fg:dark_gray)'
disabled = false

[os.symbols]
Alpine = ''
Amazon = ''
Android = ''
Arch = ''
CentOS = ''
Debian = ''
EndeavourOS = ''
Fedora = ''
FreeBSD = ''
Garuda = ''
Gentoo = ''
Linux = ''
Macos = ''
Manjaro = ''
Mariner = ''
Mint = ''
NetBSD = ''
NixOS = ''
OpenBSD = ''
OpenCloudOS = ''
openEuler = ''
openSUSE = ''
OracleLinux = '⊂⊃'
Pop = ''
Raspbian = ''
Redhat = ''
RedHatEnterprise = ''
Solus = ''
SUSE = ''
Ubuntu = ''
Unknown = ''
Windows = ''

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
format = '[─](fg:current_line)[](fg:blue)[󰉋  $read_only$path](bold fg:text_light bg:blue)[](fg:blue)'
truncation_length = 0
truncate_to_repo = true
fish_style_pwd_dir_length = 1

# ── Git (branch/status/metrics share one pill — all three must stay enabled) ──
[git_branch]
disabled = false
format = '[─](fg:current_line)[](fg:green)[$symbol $branch](bold fg:text_light bg:green)'
symbol = ' '

[git_status]
disabled = false
format = '[( $all_status$ahead_behind )](fg:text_light bg:green)'
conflicted = "✖${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[git_metrics]
disabled = false
added_style = 'fg:text_light bg:green'
deleted_style = 'fg:text_light bg:green'
format = '([+$added ]($added_style))([-$deleted]($deleted_style))[](fg:green)'

# ── Fill (divider) ────────────────────────────────────────────────────────────
[fill]
symbol = '─'
style = 'fg:current_line'

# ── Languages & Tools ─────────────────────────────────────────────────────────
[aws]
format = '[─](fg:current_line)[](fg:orange)[$symbol $profile](fg:text_dark bg:orange)[](fg:orange)'
symbol = 'aws'

[bun]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:text_light bg:green)[](fg:green)'
symbol = 'bun'

[deno]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:text_light bg:green)[](fg:green)'
symbol = 'deno'

[docker_context]
format = '[─](fg:current_line)[](fg:blue)[$symbol $context](fg:text_light bg:blue)[](fg:blue)'
symbol = 'docker'

[golang]
format = '[─](fg:current_line)[](fg:cyan)[$symbol $version](fg:text_dark bg:cyan)[](fg:cyan)'
symbol = 'go'

[custom.hugo]
command = "hugo version | grep -Eo '[0-9]+\\.[0-9]+\\.[0-9]+' | head -1"
detect_files = ["hugo.toml", "hugo.yaml", "hugo.json", "config.toml"]
detect_folders = ["content"]
symbol = 'hugo'
format = '[─](fg:current_line)[](fg:pink)[$symbol v($output)](fg:text_light bg:pink)[](fg:pink)'

[java]
format = '[─](fg:current_line)[](fg:orange)[$symbol $version](fg:text_dark bg:orange)[](fg:orange)'
symbol = 'java'

[nodejs]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:text_light bg:green)[](fg:green)'
detect_files = ["package.json", ".node-version", "!bunfig.toml", "!bun.lockb"]
symbol = 'node'

[python]
format = '[─](fg:current_line)[](fg:yellow)[$symbol $version](fg:text_dark bg:yellow)[](fg:yellow)'
symbol = 'python'

[custom.rails]
command = "rails --version | grep -Eo '[0-9]+\\.[0-9]+\\.[0-9]+' | head -1"
detect_files = ["Gemfile"]
detect_folders = ["app"]
symbol = 'rails'
ignore_timeout = true
format = '[─](fg:current_line)[](fg:red)[$symbol v($output)](fg:text_light bg:red)[](fg:red)'

[ruby]
format = '[─](fg:current_line)[](fg:red)[$symbol $version](fg:text_light bg:red)[](fg:red)'
symbol = 'ruby'

[rust]
format = '[─](fg:current_line)[](fg:orange)[$symbol $version](fg:text_dark bg:orange)[](fg:orange)'
symbol = 'rust'

[terraform]
format = '[─](fg:current_line)[](fg:purple)[$symbol $workspace](fg:text_light bg:purple)[](fg:purple)'
symbol = 'tf'

# ── Prompt Info ───────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
format = '[─](fg:current_line)[](fg:teal)[ $duration ](fg:text_dark bg:teal)[](fg:teal)'

[shell]
format = '[─](fg:current_line)[](fg:gray)[  $indicator](fg:text_dark bg:gray)[](fg:gray)'
disabled = false

[time]
format = '[─](fg:current_line)[](fg:purple)[󰦖 $time](fg:text_light bg:purple)[](fg:purple)'
use_12hr = true
time_format = '%I:%M:%S%P'
disabled = false

[username]
format = '[─](fg:current_line)[](fg:yellow)[ $user](fg:text_dark bg:yellow)[](fg:yellow)'
show_always = true

[hostname]
format = '[─](fg:current_line)[](fg:orange)[  $hostname](fg:text_dark bg:orange)[](fg:orange) '
ssh_only = false
#ssh_symbol = '🌐 '

# ── Character ─────────────────────────────────────────────────────────────────
[character]
format = "\n$symbol "
success_symbol = '[❯](fg:bold green)'
error_symbol = '[❯](fg:bold red)'
vimcmd_symbol = "[❮](fg:bold yellow)"