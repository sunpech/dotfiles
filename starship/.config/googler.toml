# ~/.config/starship.toml
# A custom Starship prompt configuration that is based off Dracula theme using Google color scheme.
# Source: https://github.com/starship/starship/discussions/1107?sort=top#discussioncomment-11130385
#
format = """
$os\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$bun\
$deno\
$golang\
$ruby\
$python\
$rust\
$java\
$docker_context\
$terraform\
$aws\
$cmd_duration\
$shell\
$time\
$username\
$line_break\
$character\
"""

palette = 'google'
add_newline = true

[palettes.google]
foreground   = '#ffffff'   # Google white â€” text
background   = '#202124'   # Google dark â€” background
current_line = '#5F6368'   # Google mid grey â€” dashes / borders
primary      = '#202124'   # Google dark â€” icon foreground
blue         = '#4285F4'   # Google Blue
blue2        = '#1A73E8'   # Google Blue â€” newer interactive/button blue
cyan         = '#24C1E0'   # Google Teal (light)
teal         = '#129EAF'   # Google Teal (dark)
green        = '#34A853'   # Google Green
orange       = '#FA7B17'   # Google Orange
pink         = '#E52592'   # Google Pink
purple       = '#A142F4'   # Google Purple
red          = '#EA4335'   # Google Red
yellow       = '#FBBC05'   # Google Yellow
gray         = '#9AA0A6'   # Google Grey â€” secondary UI text

[os]
format = '(fg:current_line)[î‚¶](fg:orange)[$symbol ](bold fg:foreground bg:orange)[î‚´](fg:orange)'
