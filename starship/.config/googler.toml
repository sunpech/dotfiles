# ~/.config/starship.toml
# A custom Starship prompt configuration that is based off Dracula theme using Google color scheme.
# Source: https://github.com/starship/starship/discussions/1107?sort=top#discussioncomment-11130385
#
format = """
$os\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$bun\
$deno\
$golang\
$ruby\
$python\
$rust\
$java\
$docker_context\
$terraform\
$aws\
$cmd_duration\
$shell\
$time\
$username\
$line_break\
$character\
"""

palette = 'google'
add_newline = true

[palettes.google]
foreground   = '#ffffff'   # Google white вАФ text
background   = '#202124'   # Google dark вАФ background
current_line = '#5F6368'   # Google mid grey вАФ dashes / borders
primary      = '#202124'   # Google dark вАФ icon foreground
box          = '#303134'   # Google dark grey вАФ content box background
blue         = '#4285F4'   # Google Blue
cyan         = '#24C1E0'   # Google Teal
green        = '#34A853'   # Google Green
orange       = '#FA7B17'   # Google Orange
pink         = '#E52592'   # Google Pink
purple       = '#A142F4'   # Google Purple
red          = '#EA4335'   # Google Red
yellow       = '#FBBC05'   # Google Yellow
gray         = '#9AA0A6'   # Google Grey вАФ secondary UI text

[os]
format = '(fg:current_line)[оВґ](fg:orange)[$symbol ](bold fg:foreground bg:orange)[оВі](fg:orange)'
disabled = false

[os.symbols]
Alpine = 'пМА'
Amazon = 'пЙ∞'
Android = 'оЬО'
Arch = 'пМГ'
CentOS = 'пМД'
Debian = 'пМЖ'
EndeavourOS = 'пМҐ'
Fedora = 'пМК'
FreeBSD = 'пММ'
Garuda = 'пЕЉ'
Gentoo = 'пМН'
Linux = 'пЕЉ'
Macos = 'пМВ'
Manjaro = 'пМТ'
Mariner = 'пЕЉ'
Mint = 'пМО'
NetBSD = 'пЕЉ'
NixOS = 'пМУ'
OpenBSD = 'пМ®'
OpenCloudOS = 'оЃ™'
openEuler = 'пЕЉ'
openSUSE = 'пМФ'
OracleLinux = 'вКВвКГ'
Pop = 'пМ™'
Raspbian = 'пМХ'
Redhat = 'пМЦ'
RedHatEnterprise = 'пМЦ'
Solus = 'пМ≠'
SUSE = 'пМФ'
Ubuntu = 'пМЫ'
Unknown = 'пДИ'
Windows = 'оЬП'

[directory]
format = '[вФА](fg:current_line)[оВґ](fg:blue)[у∞ЙЛ  $read_only$path](bold fg:foreground bg:blue)[оВі](fg:blue bg:box)'
truncation_length = 0
truncate_to_repo = true
fish_style_pwd_dir_length = 1

[git_branch]
format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol $branch](bold fg:foreground bg:green)'
symbol = 'пРШ '

[git_status]
format = '[( $all_status)](fg:foreground bg:green)[оВі](fg:green bg:box)'
conflicted = "вЬЦ"
ahead = "вЗ°${count}"
behind = "вЗ£${count}"
diverged = "вЗХвЗ°${ahead_count}вЗ£${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "¬ї${count}"
deleted = "вЬШ${count}"

[fill]
symbol = 'вФА'
style = 'fg:current_line'

[nodejs]
format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol $version](fg:primary bg:green)[оВі](fg:green bg:box)'
detect_files = ["package.json", ".node-version", "!bunfig.toml", "!bun.lockb"]
symbol = 'node'

[bun]
format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol $version](fg:primary bg:green)[оВі](fg:green bg:box)'
symbol = 'рЯ•Я'

[deno]
format = '[вФА](fg:current_line)[оВґ](fg:green)[$symbol $version](fg:primary bg:green)[оВі](fg:green bg:box)'
symbol = 'рЯ¶Х'

[golang]
format = '[вФА](fg:current_line)[оВґ](fg:cyan)[$symbol $version](fg:primary bg:cyan)[оВі](fg:cyan bg:box)'
symbol = 'go'

[ruby]
format = '[вФА](fg:current_line)[оВґ](fg:red)[$symbol $version](fg:primary bg:red)[оВі](fg:red bg:box)'
symbol = 'ruby'

[python]
format = '[вФА](fg:current_line)[оВґ](fg:yellow)[$symbol $version](fg:primary bg:yellow)[оВі](fg:yellow bg:box)'
symbol = 'python'

[rust]
format = '[вФА](fg:current_line)[оВґ](fg:orange)[$symbol $version](fg:primary bg:orange)[оВі](fg:orange bg:box)'
symbol = 'rust'

[java]
format = '[вФА](fg:current_line)[оВґ](fg:red)[$symbol $version](fg:primary bg:red)[оВі](fg:red bg:box)'
symbol = 'java'

[docker_context]
format = '[вФА](fg:current_line)[оВґ](fg:blue)[$symbol $context](fg:primary bg:blue)[оВі](fg:blue bg:box)'
symbol = 'у∞°® '

[terraform]
format = '[вФА](fg:current_line)[оВґ](fg:purple)[$symbol $workspace](fg:primary bg:purple)[оВі](fg:purple bg:box)'
symbol = 'у±БҐ '

[aws]
format = '[вФА](fg:current_line)[оВґ](fg:purple)[$symbol $profile](fg:primary bg:purple)[оВі](fg:purple bg:box)'
symbol = 'вШБпЄП'


[cmd_duration]
min_time = 500
format = '[вФА](fg:current_line)[оВґ](fg:orange)[пГІ $duration ](fg:primary bg:orange)[оВі](fg:orange bg:box)'

[shell]
format = '[вФА](fg:current_line)[оВґ](fg:gray)[пТЙ  $indicator](fg:primary bg:gray)[оВі](fg:gray bg:box)'
disabled = false

[time]
format = '[вФА](fg:current_line)[оВґ](fg:purple)[у∞¶Ц $time](fg:foreground bg:purple)[оВі](fg:purple bg:box)'
use_12hr = true
time_format = '%I:%M:%S%P'
disabled = false

[username]
format = '[вФА](fg:current_line)[оВґ](fg:yellow)[пРХ $user](fg:primary bg:yellow)[оВі](fg:yellow bg:box) '
show_always = true

[character]
format = "\n$symbol "
success_symbol = '[вЭѓ](fg:bold green)'
error_symbol = '[вЭѓ](fg:bold red)'