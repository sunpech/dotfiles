# ~/.config/googler.toml
# A custom Starship prompt configuration that is based off Dracula theme using Google color scheme.
# Source: https://github.com/starship/starship/discussions/1107?sort=top#discussioncomment-11130385

# ── Global ────────────────────────────────────────────────────────────────────
format = """
$os\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$aws\
$bun\
$deno\
$docker_context\
$golang\
${custom.hugo}\
$java\
$nodejs\
$python\
${custom.rails}\
$ruby\
$rust\
$terraform\
$cmd_duration\
$shell\
$time\
$username\
$hostname\
$line_break\
$character\
"""

palette = 'google'
add_newline = true
command_timeout = 2000

# ── Palette ───────────────────────────────────────────────────────────────────
[palettes.google]
foreground   = '#ffffff'   # Google white — text
background   = '#202124'   # Google dark — background
current_line = '#5F6368'   # Google mid grey — dashes / borders
primary      = '#202124'   # Google dark — icon foreground
blue         = '#4285F4'   # Google Blue
blue2        = '#1A73E8'   # Google Blue — newer interactive/button blue
cyan         = '#24C1E0'   # Google Teal (light)
teal         = '#129EAF'   # Google Teal (dark)
green        = '#34A853'   # Google Green
orange       = '#FA7B17'   # Google Orange
pink         = '#E52592'   # Google Pink
purple       = '#A142F4'   # Google Purple
red          = '#EA4335'   # Google Red
yellow       = '#FBBC05'   # Google Yellow
gray         = '#9AA0A6'   # Google Grey — secondary UI text
dark_gray    = '#3C4043'   # Google Dark Grey — between mid grey and background

# ── OS ────────────────────────────────────────────────────────────────────────
[os]
format = '[](fg:dark_gray)[$symbol ](bold fg:foreground bg:dark_gray)[](fg:dark_gray)'
disabled = false

[os.symbols]
Alpine = ''
Amazon = ''
Android = ''
Arch = ''
CentOS = ''
Debian = ''
EndeavourOS = ''
Fedora = ''
FreeBSD = ''
Garuda = ''
Gentoo = ''
Linux = ''
Macos = ''
Manjaro = ''
Mariner = ''
Mint = ''
NetBSD = ''
NixOS = ''
OpenBSD = ''
OpenCloudOS = ''
openEuler = ''
openSUSE = ''
OracleLinux = '⊂⊃'
Pop = ''
Raspbian = ''
Redhat = ''
RedHatEnterprise = ''
Solus = ''
SUSE = ''
Ubuntu = ''
Unknown = ''
Windows = ''

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
format = '[─](fg:current_line)[](fg:blue)[󰉋  $read_only$path](bold fg:foreground bg:blue)[](fg:blue)'
truncation_length = 0
truncate_to_repo = true
fish_style_pwd_dir_length = 1

# ── Git (branch/status/metrics share one pill — all three must stay enabled) ──
[git_branch]
disabled = false
format = '[─](fg:current_line)[](fg:green)[$symbol $branch](bold fg:foreground bg:green)'
symbol = ' '

[git_status]
disabled = false
format = '[( $all_status$ahead_behind )](fg:foreground bg:green)'
conflicted = "✖"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
disabled = false
added_style = 'fg:foreground bg:green'
deleted_style = 'fg:foreground bg:green'
format = '([+$added ]($added_style))([-$deleted]($deleted_style))[](fg:green)'

# ── Fill (divider) ────────────────────────────────────────────────────────────
[fill]
symbol = '─'
style = 'fg:current_line'

# ── Languages & Tools ─────────────────────────────────────────────────────────
[aws]
format = '[─](fg:current_line)[](fg:purple)[$symbol $profile](fg:primary bg:purple)[](fg:purple)'
symbol = 'aws'

[bun]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:primary bg:green)[](fg:green)'
symbol = 'bun'

[deno]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:primary bg:green)[](fg:green)'
symbol = 'deno'

[docker_context]
format = '[─](fg:current_line)[](fg:blue)[$symbol $context](fg:primary bg:blue)[](fg:blue)'
symbol = 'docker'

[golang]
format = '[─](fg:current_line)[](fg:cyan)[$symbol $version](fg:primary bg:cyan)[](fg:cyan)'
symbol = 'go'

[custom.hugo]
command = "hugo version | grep -Eo '[0-9]+\\.[0-9]+\\.[0-9]+' | head -1"
detect_files = ["hugo.toml", "hugo.yaml", "hugo.json", "config.toml"]
detect_folders = ["content"]
symbol = 'hugo'
format = '[─](fg:current_line)[](fg:pink)[$symbol v($output)](fg:primary bg:pink)[](fg:pink)'

[java]
format = '[─](fg:current_line)[](fg:red)[$symbol $version](fg:primary bg:red)[](fg:red)'
symbol = 'java'

[nodejs]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:primary bg:green)[](fg:green)'
detect_files = ["package.json", ".node-version", "!bunfig.toml", "!bun.lockb"]
symbol = 'node'

[python]
format = '[─](fg:current_line)[](fg:yellow)[$symbol $version](fg:primary bg:yellow)[](fg:yellow)'
symbol = 'python'

[custom.rails]
command = "rails --version | grep -Eo '[0-9]+\\.[0-9]+\\.[0-9]+' | head -1"
detect_files = ["Gemfile"]
detect_folders = ["app"]
symbol = 'rails'
format = '[─](fg:current_line)[](fg:red)[$symbol v($output)](fg:foreground bg:red)[](fg:red)'

[ruby]
format = '[─](fg:current_line)[](fg:red)[$symbol $version](fg:primary bg:red)[](fg:red)'
symbol = 'ruby'

[rust]
format = '[─](fg:current_line)[](fg:orange)[$symbol $version](fg:primary bg:orange)[](fg:orange)'
symbol = 'rust'

[terraform]
format = '[─](fg:current_line)[](fg:purple)[$symbol $workspace](fg:primary bg:purple)[](fg:purple)'
symbol = 'tf'

# ── Prompt Info ───────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
format = '[─](fg:current_line)[](fg:teal)[ $duration ](fg:primary bg:teal)[](fg:teal)'

[shell]
format = '[─](fg:current_line)[](fg:gray)[  $indicator](fg:primary bg:gray)[](fg:gray)'
disabled = false

[time]
format = '[─](fg:current_line)[](fg:purple)[󰦖 $time](fg:foreground bg:purple)[](fg:purple)'
use_12hr = true
time_format = '%I:%M:%S%P'
disabled = false

[username]
format = '[─](fg:current_line)[](fg:yellow)[ $user](fg:primary bg:yellow)[](fg:yellow)'
show_always = true

[hostname]
format = '[─](fg:current_line)[](fg:orange)[  $hostname](fg:primary bg:orange)[](fg:orange) '
ssh_only = false
#ssh_symbol = '🌐 '

# ── Character ─────────────────────────────────────────────────────────────────
[character]
format = "\n$symbol "
success_symbol = '[❯](fg:bold green)'
error_symbol = '[❯](fg:bold red)'
vimcmd_symbol = "[❮](fg:bold yellow)"