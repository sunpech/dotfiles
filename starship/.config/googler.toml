[cmd_duration]
min_time = 500
format = '[â”€](fg:current_line)[î‚¶](fg:teal)[ïƒ§ $duration ](fg:primary bg:teal)[î‚´](fg:teal)'

[shell]
format = '[â”€](fg:current_line)[î‚¶](fg:gray)[ï’‰  $indicator](fg:primary bg:gray)[î‚´](fg:gray)'
