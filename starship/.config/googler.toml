# ~/.config/starship.toml
# A custom Starship prompt configuration that is based off Dracula theme using Google color scheme.
# Source: https://github.com/starship/starship/discussions/1107?sort=top#discussioncomment-11130385
#
format = """
$os\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$bun\
$deno\
$golang\
$ruby\
$python\
$rust\
$java\
$docker_context\
$terraform\
$aws\
$cmd_duration\
$shell\
$time\
$username\
$line_break\
$character\
"""

palette = 'google'
add_newline = true

[palettes.google]
foreground   = '#ffffff'   # Google white — text
background   = '#202124'   # Google dark — background
current_line = '#5F6368'   # Google mid grey — dashes / borders
primary      = '#202124'   # Google dark — icon foreground
box          = '#303134'   # Google dark grey — content box background
blue         = '#4285F4'   # Google Blue
cyan         = '#24C1E0'   # Google Teal
green        = '#34A853'   # Google Green
orange       = '#FA7B17'   # Google Orange
pink         = '#E52592'   # Google Pink
purple       = '#A142F4'   # Google Purple
red          = '#EA4335'   # Google Red
yellow       = '#FBBC05'   # Google Yellow
gray         = '#9AA0A6'   # Google Grey — secondary UI text

[os]
format = '(fg:current_line)[](fg:orange)[$symbol ](bold fg:foreground bg:orange)[](fg:orange)'
disabled = false

[os.symbols]
Alpine = ''
Amazon = ''
Android = ''
Arch = ''
CentOS = ''
Debian = ''
EndeavourOS = ''
Fedora = ''
FreeBSD = ''
Garuda = ''
Gentoo = ''
Linux = ''
Macos = ''
Manjaro = ''
Mariner = ''
Mint = ''
NetBSD = ''
NixOS = ''
OpenBSD = ''
OpenCloudOS = ''
openEuler = ''
openSUSE = ''
OracleLinux = '⊂⊃'
Pop = ''
Raspbian = ''
Redhat = ''
RedHatEnterprise = ''
Solus = ''
SUSE = ''
Ubuntu = ''
Unknown = ''
Windows = ''

[directory]
format = '[─](fg:current_line)[](fg:blue)[󰉋  $read_only$path](bold fg:foreground bg:blue)[](fg:blue bg:box)'
truncation_length = 0
truncate_to_repo = true
fish_style_pwd_dir_length = 1

[git_branch]
format = '[─](fg:current_line)[](fg:green)[$symbol $branch](bold fg:foreground bg:green)'
symbol = ' '

[git_status]
format = '[( $all_status$ahead_behind)](fg:foreground bg:green)[](fg:green bg:box)'
conflicted = "✖"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[fill]
symbol = '─'
style = 'fg:current_line'

[nodejs]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:primary bg:green)[](fg:green bg:box)'
detect_files = ["package.json", ".node-version", "!bunfig.toml", "!bun.lockb"]
symbol = 'node'

[bun]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:primary bg:green)[](fg:green bg:box)'
symbol = '🥟'

[deno]
format = '[─](fg:current_line)[](fg:green)[$symbol $version](fg:primary bg:green)[](fg:green bg:box)'
symbol = '🦕'

[golang]
format = '[─](fg:current_line)[](fg:cyan)[$symbol $version](fg:primary bg:cyan)[](fg:cyan bg:box)'
symbol = 'go'

[ruby]
format = '[─](fg:current_line)[](fg:red)[$symbol $version](fg:primary bg:red)[](fg:red bg:box)'
symbol = 'ruby'

[python]
format = '[─](fg:current_line)[](fg:yellow)[$symbol $version](fg:primary bg:yellow)[](fg:yellow bg:box)'
symbol = 'python'

[rust]
format = '[─](fg:current_line)[](fg:orange)[$symbol $version](fg:primary bg:orange)[](fg:orange bg:box)'
symbol = 'rust'

[java]
format = '[─](fg:current_line)[](fg:red)[$symbol $version](fg:primary bg:red)[](fg:red bg:box)'
symbol = 'java'

[docker_context]
format = '[─](fg:current_line)[](fg:blue)[$symbol $context](fg:primary bg:blue)[](fg:blue bg:box)'
symbol = '󰡨 '

[terraform]
format = '[─](fg:current_line)[](fg:purple)[$symbol $workspace](fg:primary bg:purple)[](fg:purple bg:box)'
symbol = '󱁢 '

[aws]
format = '[─](fg:current_line)[](fg:purple)[$symbol $profile](fg:primary bg:purple)[](fg:purple bg:box)'
symbol = '☁️'


[cmd_duration]
min_time = 500
format = '[─](fg:current_line)[](fg:orange)[ $duration ](fg:primary bg:orange)[](fg:orange bg:box)'

[shell]
format = '[─](fg:current_line)[](fg:gray)[  $indicator](fg:primary bg:gray)[](fg:gray bg:box)'
disabled = false

[time]
format = '[─](fg:current_line)[](fg:purple)[󰦖 $time](fg:foreground bg:purple)[](fg:purple bg:box)'
use_12hr = true
time_format = '%I:%M:%S%P'
disabled = false

[username]
format = '[─](fg:current_line)[](fg:yellow)[ $user](fg:primary bg:yellow)[](fg:yellow bg:box) '
show_always = true

[character]
format = "\n$symbol "
success_symbol = '[❯](fg:bold green)'
error_symbol = '[❯](fg:bold red)'