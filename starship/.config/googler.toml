# ~/.config/starship.toml
# A custom Starship prompt configuration that is based off Dracula theme using Google color scheme.
# Source: https://github.com/starship/starship/discussions/1107?sort=top#discussioncomment-11130385
#
format = """
$os\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$bun\
$deno\
$aws\
$cmd_duration\
$shell\
$time\
$username\
$line_break\
$character\
"""

palette = 'google'
add_newline = true

[palettes.google]
foreground   = '#ffffff'   # Google white вҖ” text
background   = '#202124'   # Google dark вҖ” background
current_line = '#5F6368'   # Google mid grey вҖ” dashes / borders
primary      = '#202124'   # Google dark вҖ” icon foreground
box          = '#303134'   # Google dark grey вҖ” content box background
blue         = '#4285F4'   # Google Blue
cyan         = '#24C1E0'   # Google Teal
green        = '#34A853'   # Google Green
orange       = '#FA7B17'   # Google Orange
pink         = '#E52592'   # Google Pink
purple       = '#A142F4'   # Google Purple
red          = '#EA4335'   # Google Red
yellow       = '#FBBC05'   # Google Yellow
gray         = '#9AA0A6'   # Google Grey вҖ” secondary UI text

[os]
format = '(fg:current_line)[оӮ¶](fg:red)[$symbol ](fg:primary bg:red)[оӮҙ](fg:red)'
disabled = false

[os.symbols]
Alpine = 'пҢҖ'
Amazon = 'пү°'
Android = 'оңҺ'
Arch = 'пҢғ'
CentOS = 'пҢ„'
Debian = 'пҢҶ'
EndeavourOS = 'пҢў'
Fedora = 'пҢҠ'
FreeBSD = 'пҢҢ'
Garuda = 'п…ј'
Gentoo = 'пҢҚ'
Linux = 'п…ј'
Macos = 'пҢӮ'
Manjaro = 'пҢ’'
Mariner = 'п…ј'
Mint = 'пҢҺ'
NetBSD = 'п…ј'
NixOS = 'пҢ“'
OpenBSD = 'пҢЁ'
OpenCloudOS = 'о®Ә'
openEuler = 'п…ј'
openSUSE = 'пҢ”'
OracleLinux = 'вҠӮвҠғ'
Pop = 'пҢӘ'
Raspbian = 'пҢ•'
Redhat = 'пҢ–'
RedHatEnterprise = 'пҢ–'
Solus = 'пҢӯ'
SUSE = 'пҢ”'
Ubuntu = 'пҢӣ'
Unknown = 'п„Ҳ'
Windows = 'оңҸ'

[directory]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[у°үӢ ](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оӮҙ](fg:box)'
home_symbol = "оӯҶ ~/"
truncation_symbol = 'оҜҹ '
truncation_length = 2
read_only = 'уұ§ө '
read_only_style = ''

[git_branch]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $branch](fg:foreground bg:box)'
symbol = 'пҗҳ '

[git_status]
format = '[( $all_status)](fg:foreground bg:box)[оӮҙ](fg:box)'

[nodejs]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
detect_files = ["package.json", ".node-version", "!bunfig.toml", "!bun.lockb"]

[bun]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'рҹҘҹ'

[deno]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'рҹҰ•'

[aws]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[$symbol](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $profile](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'вҳҒпёҸ'

[fill]
symbol = 'в”Җ'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
format = '[в”Җ](fg:current_line)[оӮ¶](fg:orange)[пғ§ ](fg:primary bg:orange)[оӮҙ](fg:orange bg:box)[ $duration ](fg:foreground bg:box)[оӮҙ](fg:box)'

[shell]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:gray)[п’ү ](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $indicator](fg:foreground bg:box)[оӮҙ](fg:box)'
disabled = false

[time]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[у°Ұ– ](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $time](fg:foreground bg:box)[оӮҙ](fg:box)'
time_format = '%H:%M'
disabled = false

[username]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[пҗ• ](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $user](fg:foreground bg:box)[оӮҙ](fg:box) '
show_always = true

[character]
format = "\n$symbol "
success_symbol = '[вқҜ](fg:bold green)'
error_symbol = '[вқҜ](fg:bold red)'