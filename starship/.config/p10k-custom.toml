# ~/.config/starship.toml
# Recreates the p10k powerline style from screenshot:
#   [~/.dotfiles] [develop !1 ?1] В·В·В·В·В·В·В·В·В·В·В·В·В· [system node] [09:53:22 AM]
#   >
#
# Requires a Nerd Font with powerline glyphs (MesloLGS NF, JetBrains Mono NF, etc.)

# в”Җв”Җ Global в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

add_newline = true
command_timeout = 1000

# в”Җв”Җ Prompt layout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Left:  os вҶ’ dir segment вҶ’ git segment вҶ’ fill dots
# Right: node context вҶ’ time
# Line 2: character (вқҜ)

format = """
[](fg:os_bg)\
$os\
[](fg:os_bg bg:dir_bg)\
$directory\
[](fg:dir_bg bg:git_bg)\
$git_branch\
$git_status\
[](fg:git_bg)\
$fill\
$cmd_duration\
$line_break\
$character"""

right_format = """$nodejs$python$rust$golang[](fg:ctx_bg)$time[](fg:time_bg)"""

# в”Җв”Җ Palette в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

palette = "p10k_clone"

[palettes.p10k_clone]
os_bg     = "#555555"   # dark grey    вҖ” OS segment
os_fg     = "#ffffff"   # white icon
dir_bg    = "#4285F4"   # Google Blue  вҖ” directory segment
dir_fg    = "#ffffff"
git_bg    = "#34A853"   # Google Green вҖ” git segment
git_fg    = "#ffffff"
ctx_bg    = "#FBBC05"   # Google Yellow вҖ” language context segment
ctx_fg    = "#000000"
time_bg   = "#ffffff"   # white вҖ” time segment
time_fg   = "#000000"   # black text
fill_fg   = "#888888"   # mid-grey dots
ok_green  = "#34A853"   # Google Green
err_red   = "#EA4335"   # Google Red

# в”Җв”Җ OS identifier в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[os]
disabled = false
style = "bold fg:os_fg bg:os_bg"
format = "[ $symbol ]($style)"

[os.symbols]
Alpine           = "оҢҖ"   # Alpine Linux
Amazon           = "оҢ№"   # Amazon Linux
Android          = "п…»"   # Android robot
Arch             = "пҢғ"   # Arch Linux
CentOS           = "пҢ„"   # CentOS
Debian           = "пҢҶ"   # Debian swirl
DragonFly        = "пҢҢ"   # DragonFly BSD
EndeavourOS      = "оҢ«"   # EndeavourOS
Fedora           = "пҢҠ"   # Fedora infinity
FreeBSD          = "пҢҢ"   # FreeBSD demon
Garuda           = "рҹҰ…"       # Garuda Linux
Gentoo           = "пҢҚ"   # Gentoo
Linux            = "п…ј"   # Generic Linux penguin (Tux)
Macos            = "п…№"   # Apple
Manjaro          = "пҢ’"   # Manjaro logo
Mint             = "у°Ӯӯ"   # Linux Mint
NetBSD           = "пҢ–"   # NetBSD flag
NixOS            = "пҢ“"   # NixOS snowflake
OpenBSD          = "у°Ҳё"   # OpenBSD puffer fish
openSUSE         = "пҢ”"   # openSUSE
Pop              = "оҢү"   # Pop!_OS
Raspbian         = "пҢ•"   # Raspberry Pi
Redhat           = "пҢ–"   # Red Hat
RedHatEnterprise = "у°Өӣ"   # RHEL
Solus            = "П•"        # Solus
Ubuntu           = "пҢӣ"   # Ubuntu circle
Unknown          = "п…ј"   # Generic Linux penguin (Tux)
Windows          = "у°ҚІ"   # Windows flag

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style = "bold fg:dir_fg bg:dir_bg"
format = "[ у°үӢ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
read_only = " у°Ңҫ"
read_only_style = "fg:err_red bg:dir_bg"

# в”Җв”Җ Git branch в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_branch]
style = "bold fg:git_fg bg:git_bg"
symbol = "пҗҳ "   #  git logo +  branch icon
format = "[ $symbol$branch ]($style)"

# в”Җв”Җ Git status в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Matches p10k: !1 for modified, ?1 for untracked, +1 staged, вҮЎ/вҮЈ ahead/behind

[git_status]
style = "bold fg:white bg:err_red"
# When dirty: greenвҶ’red bubble inside the green block; hidden when clean
format = '([](fg:git_bg bg:err_red)[ $all_status$ahead_behind ]($style)[](fg:err_red bg:git_bg))'
modified   = "вңҺ${count}"
untracked  = "?${count}"
staged     = "вңҡ${count}"
ahead      = "вҮЎ${count}"
behind     = "вҮЈ${count}"
diverged   = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
stashed    = "у°Ҹ— "
renamed    = "В»${count}"
deleted    = "вңҳ${count}"
conflicted = "уұў’ ${count}"

# в”Җв”Җ Fill (the dotted line between left and right) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[fill]
symbol = "В·"
style = "fg:fill_fg"

# в”Җв”Җ Right prompt: language context pill в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Shows whichever runtime is active вҖ” mirrors "system node" in your screenshot

[nodejs]
style = "fg:ctx_fg bg:ctx_bg"
symbol = "оңҳ "
format = "[ $symbol$version ]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]
version_format = "v${raw}"

[python]
style = "fg:ctx_fg bg:ctx_bg"
symbol = " "
format = '[ $symbol$version(\($virtualenv\)) ]($style)'
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile"]
version_format = "v${raw}"

[rust]
style = "fg:ctx_fg bg:ctx_bg"
symbol = "оһЁ "
format = "[ $symbol$version ]($style)"
version_format = "v${raw}"

[golang]
style = "fg:ctx_fg bg:ctx_bg"
symbol = "оҳ§ "
format = "[ $symbol$version ]($style)"
version_format = "v${raw}"

# в”Җв”Җ Time в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[time]
disabled = false
style = "fg:time_fg bg:time_bg"
format = "[ у°Ҙ” $time ]($style)"
time_format = "%I:%M:%S %p"   # matches "09:53:22 AM" from your screenshot

# в”Җв”Җ Command duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[took $duration ]($style)"

# в”Җв”Җ Prompt character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вқҜ](bold fg:ok_green)"
error_symbol   = "[вқҜ](bold fg:err_red)"
vimcmd_symbol  = "[вқ®](bold fg:ctx_bg)"

# в”Җв”Җ Disabled / noisy modules в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[docker_context]
disabled = true